    name: "No Defenses"
    rate_limit_per_minute: 100
    auth_required: false
    input_sanitizer: false
    keyword_blocklist: false
    regex_filter: false
    prompt_firewall: false
    haiku_judge: false
    parameterized_queries: false
    result_size_limit: null
    path_normalization: false
    rag_safety_filter: false
    redact_pii_in_response: false
    system_prompt_protection: false
    output_classifier: false
