# Defense Level Configuration
# Level 0: No defenses (deliberately vulnerable)
# Level 1: Basic input filtering
# Level 2: Authentication + stronger filtering
# Level 3: Full middleware stack + parameterized queries + ProofLayer
# Level 4: Maximum security (Haiku judge + dual LLM + strict rate limits)

levels:
